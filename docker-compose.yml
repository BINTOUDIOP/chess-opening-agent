services:

  backend:
    build: ./backend
    container_name: ffe_backend
    ports:
      - "8000:8000"
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - STOCKFISH_PATH=/usr/games/stockfish
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=ffe_chess
    depends_on:
      - milvus
      - mongo
    networks:
      - ffe_net

  frontend:
    build: ./frontend
    container_name: ffe_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - ffe_net

  mongo:
    image: mongo:7
    container_name: ffe_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ffe_net

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: milvus_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - ffe_net

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: milvus_minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    command: minio server /data
    volumes:
      - minio_data:/data
    networks:
      - ffe_net

  attu:
    image: zilliz/attu:v2.4
    container_name: milvus_attu
    ports:
      - "8080:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus
    networks:
      - ffe_net

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: milvus_standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: ${MINIO_ADDRESS}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - ffe_net

volumes:
  mongo_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  ffe_net:
    driver: bridge
